version: '3.8'

services:
  db:
    image: postgres:15
    container_name: opsera_db_local
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: opsera_db
    ports:
      - "54321:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: opsera_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@opsera.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  pg_data:
