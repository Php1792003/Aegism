                            <label class="text-xs text-gray-500 mb-1 font-semibold block uppercase tracking-wide">Tìm kiếm</label>
                            <div class="relative">

                                </div>
                                <input type="text" x-model="searchQuery" @input.debounce.500ms="fetchLogs()" placeholder="Tên, hành động..." class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg leading-5 bg-white placeholder-gray-500 focus:outline-none focus:placeholder-gray-400 focus:ring-1 focus:ring-opsera-primary focus:border-opsera-primary sm:text-sm shadow-sm">

                <div x-show="isLoading" class="flex justify-center py-10">

                </div>

                <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden" x-show="!isLoading">

                                    <th class="px-6 py-4">Hành động</th>
                                    <th class="px-6 py-4 w-1/2">Chi tiết</th>
                                    <th class="px-6 py-4 text-right">Thời gian</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100 text-sm">
                                <template x-for="log in logs" :key="log.id">
                                    <tr class="hover:bg-gray-50 transition-colors">
                                        <td class="px-6 py-4">
                                            <div class="flex items-center">
                                                <div class="h-9 w-9 rounded-full bg-blue-100 flex items-center justify-center text-xs font-bold text-blue-600 mr-3 flex-shrink-0 border border-blue-200">
                                                    <span x-text="(log.user?.fullName || 'Unknown').charAt(0)"></span>
                                                </div>
                                                <div>
                                                    <div class="font-medium text-gray-900" x-text="log.user?.fullName || 'Unknown User'"></div>
                                                    <div class="text-xs text-gray-400 truncate max-w-[150px]" x-text="log.user?.email || 'N/A'"></div>
                                                </div>
                                            </div>
                                        </td>
                                        
                                        <td class="px-6 py-4 whitespace-nowrap">
                                            <span class="px-3 py-1 rounded-full text-xs font-bold border flex items-center w-fit gap-1.5 transition-all hover:shadow-sm"

                                                <span x-html="getActionStyle(log.action).icon"></span>
                                                <span x-text="getActionLabel(log.action)"></span>
                                            </span>

                                        <td class="px-6 py-4 text-gray-600">
                                            <div class="text-sm font-medium text-gray-800 mb-1" x-html="formatDescription(log)"></div>
                                            <div class="text-xs text-gray-400 flex items-center gap-1">
                                                <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>

                                            </div>
                                        </td>

                                        <td class="px-6 py-4 whitespace-nowrap text-right">
                                            <div class="text-gray-900 font-medium" x-text="new Date(log.createdAt).toLocaleTimeString('vi-VN')"></div>
                                            <div class="text-xs text-gray-400" x-text="new Date(log.createdAt).toLocaleDateString('vi-VN')"></div>
                                        </td>
                                    </tr>
                                </template>
                                <tr x-show="logs.length === 0">
                                    <td colspan="4" class="px-6 py-12 text-center text-gray-500">
                                        <div class="flex flex-col items-center justify-center">
                                            <svg class="w-12 h-12 text-gray-300 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>

                            </tbody>

                    <div class="px-6 py-4 border-t border-gray-200 bg-gray-50 flex items-center justify-between">
                        <span class="text-sm text-gray-500">Trang <span class="font-bold text-gray-900" x-text="currentPage"></span> / <span x-text="totalPages"></span></span>
                        <div class="flex gap-2">
                            <button @click="changePage(currentPage - 1)" :disabled="currentPage <= 1" class="px-3 py-1 border border-gray-300 rounded bg-white text-gray-600 hover:bg-gray-50 text-sm disabled:opacity-50 disabled:cursor-not-allowed shadow-sm transition-colors">Trước</button>
                            <button @click="changePage(currentPage + 1)" :disabled="currentPage >= totalPages" class="px-3 py-1 border border-gray-300 rounded bg-white text-gray-600 hover:bg-gray-50 text-sm disabled:opacity-50 disabled:cursor-not-allowed shadow-sm transition-colors">Sau</button>
                        </div>
                    </div>
                </div>

            </main>

    <script>
        const API_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
                    ? 'http://localhost:3000'
                    : 'https://aegism.online';

        function auditApp() {
            return {
                sidebarOpen: false, currentPlan: 'starter', 
                user: { name: 'User', avatar: '', role: 'User', isSuperAdmin: false, isTenantAdmin: false },
                projects: [], selectedProjectId: '', searchQuery: '',
                logs: [], isLoading: false, currentPage: 1, totalPages: 1, limit: 20,

                async init() {
                    const token = localStorage.getItem('accessToken');
                    if (!token) { window.location.href = '/login.html'; return; }
                    const userStr = localStorage.getItem('user');
                    if (userStr) {
                        const userData = JSON.parse(userStr);
                        
                        this.user.name = userData.fullName || 'Người dùng';
                        if (userData.avatar && userData.avatar.trim() !== '') {
                            this.user.avatar = userData.avatar;
                        } else {
                            this.user.avatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(this.user.name)}&background=2563EB&color=fff`;
                        }

                        const isSuper = userData.isSuperAdmin === true || userData.isSuperAdmin === 'true' || userData.isSuperAdmin === 1;
                        const isTenant = userData.isTenantAdmin === true || userData.isTenantAdmin === 'true' || userData.isTenantAdmin === 1;

                        if (isSuper) this.user.role = 'Super Admin';
                        else if (isTenant) this.user.role = 'Quản trị viên';
                        else if (userData.role && userData.role.name) this.user.role = userData.role.name;
                        else this.user.role = 'Nhân viên';

                        if (userData.tenant) {
                            this.currentPlan = userData.tenant.subscriptionPlan?.toLowerCase() || 'starter';
                        }
                    }
                    await this.fetchProjects();
                    await this.fetchLogs();
                },

                async fetchProjects() {
                    try {
                        const res = await fetch(`${API_URL}/api/projects`, {
                            headers: { 'Authorization': `Bearer ${localStorage.getItem('accessToken')}` }
                        });
                        if (res.ok) this.projects = await res.json();
                    } catch(e) {}
                },

                async fetchLogs() {
                    this.isLoading = true;
                    try {
                        const params = new URLSearchParams({ page: this.currentPage, limit: this.limit });
                        if (this.searchQuery) params.append('action', this.searchQuery);
                        if (this.selectedProjectId) params.append('projectId', this.selectedProjectId); // Gửi projectId nếu có

                        const res = await fetch(`${API_URL}/api/audit/tenant-activities?${params.toString()}`, {
                            headers: { 'Authorization': `Bearer ${localStorage.getItem('accessToken')}` }
                        });
                        if (res.ok) {
                            const data = await res.json();
                            this.logs = data.logs;
                            this.totalPages = data.totalPages;
                        }
                    } catch (error) { console.error(error); } 
                    finally { this.isLoading = false; }
                },
                
                changePage(page) {
                    if (page < 1 || page > this.totalPages) return;
                    this.currentPage = page;
                    this.fetchLogs();
                },

                formatDescription(log) {
                    try {
                        let details = log.details;
                        if (typeof details === 'string') {
                            try { details = JSON.parse(details); } catch(e) { return details; }
                        }
                        if (!details) return 'Không có chi tiết';

                        if (details.message) return details.message;

                        const fieldMap = {
                            fullName: 'Họ tên',
                            email: 'Email',
                            title: 'Tiêu đề task',
                            name: 'Tên',
                            status: 'Trạng thái',
                            priority: 'Độ ưu tiên',
                            description: 'Mô tả',
                            deadline: 'Hạn chót',
                            roleId: 'Quyền hạn (Role)',
                            assigneeId: 'Người thực hiện',
                            projectId: 'Dự án'
                        };


                        if (log.action === 'USER_LOGIN_SUCCESS') return `<span class="text-green-600 font-bold">Đăng nhập thành công</span> vào hệ thống.`;
                        if (log.action === 'USER_LOGIN_FAILED') return `<span class="text-red-600 font-bold">Đăng nhập thất bại</span> (Sai thông tin).`;

                        if (log.action === 'CREATE_MEMBER') {
                            return `Thêm nhân sự mới: <b>${details.fullName || details.email || 'N/A'}</b>`;
                        }
                        if (log.action === 'DELETE_MEMBER') {
                            return `Xóa nhân sự: <span class="text-red-600 font-bold">${details.originalEmail || details.email || 'N/A'}</span> khỏi hệ thống.`;
                        }
                        if (log.action === 'UPDATE_MEMBER') {
                            return this.generateUpdateString(details, fieldMap, 'thông tin nhân sự');
                        }

                        if (log.action === 'CREATE_TASK') {
                            return `Tạo công việc mới: <b>"${details.taskTitle || details.title}"</b>`;
                        }
                        if (log.action === 'UPDATE_TASK') {
                            return this.generateUpdateString(details, fieldMap, 'công việc');
                        }
                        if (log.action === 'DELETE_TASK') {
                            return `Xóa công việc: <b>"${details.taskTitle || details.title || 'N/A'}"</b>`;
                        }
                        if (log.action === 'ACCEPT_TASK') {
                            return `Đã tiếp nhận xử lý công việc.`;
                        }

                        if (log.action === 'CREATE_PROJECT') {
                            return `Khởi tạo dự án mới: <b>${details.projectName || details.name}</b>`;
                        }
                        if (log.action === 'UPDATE_PROJECT') {
                            return this.generateUpdateString(details, fieldMap, 'dự án');
                        }
                        if (log.action === 'DELETE_PROJECT') {
                            return `Xóa dự án: <b>${details.projectName || details.name}</b>`;
                        }

                        if (log.action === 'CREATE_ROLE') return `Tạo vai trò mới: <b>${details.roleName || details.name}</b>`;
                        if (log.action === 'DELETE_ROLE') return `Xóa vai trò: <b>${details.roleName || details.name}</b>`;

                        if (log.action === 'REPORT_INCIDENT') return `Báo cáo sự cố mới tại: <b>${details.qrCode || 'Vị trí chưa xác định'}</b>`;
                        if (log.action === 'ASSIGN_INCIDENT') return `Phân công xử lý sự cố cho: <b>${details.assignedTo || details.role || 'Bộ phận liên quan'}</b>`;

                        return `Thực hiện: ${log.action}`;

                    } catch (e) {
                        return 'Dữ liệu log không hợp lệ.';
                    }
                },

                generateUpdateString(details, fieldMap, contextName) {
                    const changes = details.changes || details; 
                    const changeList = [];
                    const ignoreKeys = ['id', 'updatedAt', 'createdAt', 'tenantId', 'password', 'memberId', 'taskId', 'projectId'];

                    for (const [key, value] of Object.entries(changes)) {
                        if (ignoreKeys.includes(key) || value === undefined || value === null) continue;

                        const fieldName = fieldMap[key] || key;
                        
                        let displayValue = value;
                        if (typeof value === 'string' && value.startsWith('data:image')) displayValue = '[Hình ảnh mới]';
                        if (key === 'status' || key === 'priority') displayValue = `<span class="font-bold uppercase">${value}</span>`;

                        changeList.push(`đổi ${fieldName} thành ${displayValue}`);
                    }

                    if (changeList.length === 0) return `Cập nhật ${contextName} (Chi tiết ẩn)`;
                    
                    const result = `Cập nhật ${contextName}: ${changeList.join(', ')}.`;
                    return result.charAt(0).toUpperCase() + result.slice(1);
                },

                getActionLabel(action) {
                    const map = {
                        'USER_LOGIN_SUCCESS': 'Đăng nhập',
                        'USER_LOGIN_FAILED': 'Lỗi Login',
                        'CREATE_MEMBER': 'Tạo NV',
                        'UPDATE_MEMBER': 'Sửa NV',
                        'DELETE_MEMBER': 'Xóa NV',
                        'UPDATE_PROJECT': 'Sửa Dự án',
                        'CREATE_TASK': 'Tạo Task',
                        'UPDATE_TASK': 'Sửa Task',
                    };
                    return map[action] || action.split('_')[0];
                },

                getActionStyle(action) {
                    if (action.includes('LOGIN_SUCCESS')) return { class: 'bg-green-100 text-green-700 border-green-200', icon: '<svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 01-3-3"/></svg>' };
                    if (action.includes('LOGIN_FAILED')) return { class: 'bg-red-100 text-red-700 border-red-200', icon: '<svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>' };
                    if (action.includes('CREATE')) return { class: 'bg-blue-100 text-blue-700 border-blue-200', icon: '<svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>' };
                    if (action.includes('UPDATE')) return { class: 'bg-yellow-100 text-yellow-700 border-yellow-200', icon: '<svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>' };
                    return { class: 'bg-gray-100 text-gray-700 border-gray-200', icon: '' };
                },

                logout() { localStorage.clear(); window.location.href = '/login.html'; }
            }
        }
    </script>
</body>
</html>
