<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Lỗi Máy Chủ | Opsera</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="../img/logo_header.png">
    <style>
        body { font-family: 'Nunito', sans-serif; }
        .animation-pulse-slow {
            animation: pulse-slow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-slow {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
        .gear-spin {
            animation: spin 10s linear infinite;
            transform-origin: center;
        }
        .gear-spin-reverse {
            animation: spin-reverse 12s linear infinite;
            transform-origin: center;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes spin-reverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'opsera-primary': '#2563EB',
                        'opsera-dark': '#1F2937',
                        'opsera-light': '#F3F4F6',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 h-screen flex items-center justify-center overflow-hidden">

    <div class="container mx-auto px-4">
        <div class="flex flex-col lg:flex-row items-center justify-center gap-12">
            
            <div class="w-full lg:w-1/2 flex justify-center relative">
                <svg class="w-full max-w-md h-auto" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="100" y="50" width="200" height="220" rx="8" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="2"/>
                    <rect x="120" y="70" width="160" height="30" rx="4" fill="#DBEAFE"/>
                    <rect x="120" y="110" width="160" height="30" rx="4" fill="#DBEAFE"/>
                    <rect x="120" y="150" width="160" height="30" rx="4" fill="#FEE2E2"/>
                    <rect x="120" y="190" width="160" height="30" rx="4" fill="#DBEAFE"/>
                    
                    <circle cx="140" cy="85" r="4" fill="#34D399" class="animation-pulse-slow"/>
                    <circle cx="155" cy="85" r="4" fill="#34D399"/>
                    <circle cx="140" cy="165" r="4" fill="#EF4444" class="animate-ping"/>
                    <circle cx="155" cy="165" r="4" fill="#EF4444"/>

                    <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-size="120" font-weight="900" fill="#2563EB" style="filter: drop-shadow(4px 4px 0px rgba(30, 64, 175, 0.2)); mix-blend-mode: multiply;">500</text>

                    <g class="gear-spin" opacity="0.8">
                        <path d="M320 220l-5 9a2 2 0 01-2.5.5l-9-4a2 2 0 01-1 2.5l4 9a2 2 0 01-1.5 2.5l-9 1a2 2 0 01-2-1.5l-4-9a2 2 0 01.5-2.5l9-5a2 2 0 012.5.5l4 9a2 2 0 012.5 1.5l1 9a2 2 0 01-1.5 2z" fill="#93C5FD" stroke="#3B82F6" stroke-width="2"/>
                        <circle cx="310" cy="230" r="5" fill="#60A5FA"/>
                    </g>
                    
                    <g class="gear-spin-reverse" opacity="0.6">
                        <path d="M80 80l5-9a2 2 0 012.5-.5l9 4a2 2 0 011-2.5l-4-9a2 2 0 011.5-2.5l9-1a2 2 0 012 1.5l4 9a2 2 0 01-.5 2.5l-9 5a2 2 0 01-2.5-.5l-4-9a2 2 0 01-2.5-1.5l-1-9a2 2 0 011.5-2z" fill="#93C5FD" stroke="#3B82F6" stroke-width="2"/>
                        <circle cx="90" cy="70" r="5" fill="#60A5FA"/>
                    </g>

                    <path d="M280 140 L300 180 L260 180 Z" fill="#FBBF24" stroke="#D97706" stroke-width="2" transform="rotate(15 280 160)"/>
                    <text x="276" y="172" font-size="24" font-weight="bold" fill="#92400E" transform="rotate(15 280 160)">!</text>
                </svg>
            </div>

            <div class="w-full lg:w-1/2 text-center lg:text-left space-y-6">
                <div class="inline-block px-3 py-1 text-xs font-semibold tracking-wider text-red-600 uppercase bg-red-100 rounded-full">
                    Lỗi máy chủ
                </div>
                
                <h1 class="text-4xl lg:text-5xl font-extrabold text-gray-900 tracking-tight">
                    Xin lỗi, có sự cố<br>
                    <span class="text-opsera-primary">từ phía chúng tôi.</span>
                </h1>
                
                <p class="text-gray-500 text-lg max-w-lg mx-auto lg:mx-0">
                    Máy chủ đang gặp trục trặc kỹ thuật. Đội ngũ kỹ thuật của chúng tôi đã được thông báo và đang nỗ lực khắc phục. Vui lòng thử lại sau ít phút.
                </p>

                <div class="flex flex-col sm:flex-row items-center justify-center lg:justify-start gap-4 pt-4">
                    <button onclick="window.location.reload()" class="w-full sm:w-auto px-8 py-3 bg-gray-200 text-gray-700 rounded-lg font-semibold hover:bg-gray-300 transition-all flex items-center justify-center">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        Tải lại trang
                    </button>
                    
                    <a href="../ternants/dashboard.html" class="w-full sm:w-auto px-8 py-3 bg-opsera-primary text-white rounded-lg font-semibold hover:bg-blue-700 shadow-lg shadow-blue-500/30 transition-all flex items-center justify-center transform hover:-translate-y-0.5">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                        Về Trang chủ
                    </a>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
